<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Change Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f18;
      --card: #17171f;
      --border: rgba(255,255,255,0.08);
      --ink: #f0f0f5;
      --muted: #8888a0;
    }

    body {
      background: var(--bg);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Background orb */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.15), transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .task-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6c63ff;
      background: rgba(108,99,255,0.12);
      border: 1px solid rgba(108,99,255,0.25);
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* THE BUTTON */
    #colorBtn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #fff;
      background: #6c63ff;
      border: none;
      border-radius: 14px;
      padding: 18px 40px;
      cursor: pointer;
      transition: background 0.4s ease, transform 0.15s, box-shadow 0.4s;
      box-shadow: 0 8px 28px rgba(108,99,255,0.35);
      position: relative;
      overflow: hidden;
    }

    #colorBtn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #colorBtn:hover::after { opacity: 1; }
    #colorBtn:active { transform: scale(0.97); }

    /* Color display */
    .color-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 36px;
      padding: 16px 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.4s;
    }

    .swatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #6c63ff;
      border: 2px solid rgba(255,255,255,0.2);
      transition: background 0.4s;
      flex-shrink: 0;
    }

    .color-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
    }

    .color-value {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      transition: color 0.4s;
    }

    .click-count {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .click-count span {
      font-weight: 700;
      color: var(--ink);
    }

    footer {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.12);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div style="width:100%; max-width:480px;">
    <div class="card">
      <span class="task-tag">Task 2a &mdash; JavaScript</span>
      <h1>Color Change Button</h1>
      <p class="subtitle">Click the button below to watch it change to a random color each time!</p>

      <button id="colorBtn" onclick="changeColor()">
        🎨 Click to Change Color
      </button>

      <div class="color-strip" id="colorStrip">
        <div class="swatch" id="swatch"></div>
        <span class="color-label">Current color:</span>
        <span class="color-value" id="colorValue">#6C63FF</span>
      </div>

      <p class="click-count">Times clicked: <span id="counter">0</span></p>
    </div>

    <footer>Cognifyz Internship &mdash; Level 1, Task 2a</footer>
  </div>

  <script>
    const colors = [
      { hex: '#6C63FF', shadow: 'rgba(108,99,255,0.4)'  },
      { hex: '#E85D26', shadow: 'rgba(232,93,38,0.4)'   },
      { hex: '#10B981', shadow: 'rgba(16,185,129,0.4)'  },
      { hex: '#F59E0B', shadow: 'rgba(245,158,11,0.4)'  },
      { hex: '#EC4899', shadow: 'rgba(236,72,153,0.4)'  },
      { hex: '#3B82F6', shadow: 'rgba(59,130,246,0.4)'  },
      { hex: '#EF4444', shadow: 'rgba(239,68,68,0.4)'   },
      { hex: '#8B5CF6', shadow: 'rgba(139,92,246,0.4)'  },
      { hex: '#06B6D4', shadow: 'rgba(6,182,212,0.4)'   },
      { hex: '#84CC16', shadow: 'rgba(132,204,22,0.4)'  },
    ];

    let currentIndex = 0;
    let count = 0;

    function changeColor() {
      currentIndex = (currentIndex + 1) % colors.length;
      const { hex, shadow } = colors[currentIndex];

      const btn = document.getElementById('colorBtn');
      const swatch = document.getElementById('swatch');
      const colorValue = document.getElementById('colorValue');

      btn.style.background = hex;
      btn.style.boxShadow = `0 8px 28px ${shadow}`;
      swatch.style.background = hex;
      colorValue.textContent = hex.toUpperCase();

      count++;
      document.getElementById('counter').textContent = count;

      // Bounce animation
      btn.style.transform = 'scale(0.95)';
      setTimeout(() => { btn.style.transform = 'scale(1)'; }, 150);
    }
  </script>
</body>
</html>
